<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 | My Bio</title>
    <style>
        :root {
            --primary: #F3A04C;
            --background: #F4F4F6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --background: #1a1a1a;
                --card-bg: #2d2d2d;
                --text-main: #eeeeee;
                --text-sub: #aaaaaa;
            }
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }
        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background-color: var(--primary);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            color: var(--text-main);
            margin: 10px 0;
        }
        p {
            font-size: 16px;
            color: var(--text-sub);
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: transform 0.2s, border-color 0.2s;
            border: 1px solid transparent;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头像，如果没有图片可以保持这个字母占位 -->
        <div class="profile-pic">T</div>
        
        <h1>你的名字</h1>
        <p>这里写一句简短的个人描述，比如：开发者 / 设计师 / 终身学习者</p>

        <div class="links">
            <a href="https://your-blog.com" class="link-card">个人博客</a>
            <a href="https://github.com/your-username" class="link-card">GitHub 项目</a>
            <a href="mailto:your-email@example.com" class="link-card">联系我</a>
            <a href="#" class="link-card">其他社交媒体</a>
        </div>
    </div>
</body>
</html>
